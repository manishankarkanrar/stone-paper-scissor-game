<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stone Paper Scissor</title>
    <link rel="stylesheet" href="./stone_paper_scissor.css" />
  </head>
  <body>
    <main>
      <h1>Welcome to Stone-Paper-Scissor</h1>
      <div class="choices">
        <div id="rock" class="choice" title="Rock">
          <img src="./rock.png" alt="Rock Image" class="gameimg" />
        </div>
        <div id="paper" class="choice" title="Paper">
          <img src="./paper.png" alt="Paper Image" class="gameimg" />
        </div>
        <div id="scissor" class="choice" title="Scissor">
          <img src="./scissors.png" alt="Scissor Image" class="gameimg" />
        </div>
      </div>
      <div class="scoreboard">
        <div class="score" id="userscore">
          <p>User :</p>
          <p class="uDisplay">0</p>
        </div>
        <div class="score" id="comscore">
          <p>Computer :</p>
          <p class="cDisplay">0</p>
        </div>
      </div>
      <div class="msgContainer">
        <p class="msg">Play your move</p>
      </div>
      <div>
        <button class="reset">Reset</button>
      </div>
    </main>
    <footer class="footer">
      <div class="footer-container">
        <p class="footer-text">
          🚀 Developed by <span>Manishankar Kanrar</span> © 2026
        </p>

        <a
          href="https://www.linkedin.com/in/manishankar-kanrar/"
          target="_blank"
          class="linkedin-link"
        >
          <img
            src="https://img.icons8.com/color/96/linkedin.png"
            alt="LinkedIn"
            class="linkedin-icon"
          />
        </a>
      </div>
    </footer>
    <script src="./stone_paper_scissor.js"></script>
  </body>
</html>
